services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      - redis

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
    env_file:
      - .env
    ports:
      - "5173:5173"

  operator:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.operator
    env_file:
      - .env
    ports:
      - "5174:5174"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - dashboard
      - operator
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

