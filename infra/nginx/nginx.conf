worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_time":"$upstream_response_time",'
      '"request_id":"$request_id"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # ── Gzip ──────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/json
             application/javascript application/x-javascript
             text/xml application/xml application/xml+rss image/svg+xml;
  gzip_min_length 1024;

  # ── Rate limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=webhook_limit:5m rate=300r/m;
  limit_req_zone $binary_remote_addr zone=auth_limit:5m rate=10r/m;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options           "DENY"                    always;
  add_header X-Content-Type-Options    "nosniff"                 always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "geolocation=(self)"      always;
  add_header X-Request-Id              $request_id               always;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream api_upstream {
    server api:4000;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
  }

  upstream dashboard_upstream {
    server dashboard:5173;
    keepalive 16;
  }

  upstream operator_upstream {
    server operator:5174;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS main server ─────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/ssl/certs/detrix.crt;
    ssl_certificate_key /etc/ssl/private/detrix.key;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 10m;
    proxy_read_timeout   60s;
    proxy_send_timeout   60s;
    proxy_connect_timeout 10s;

    # ── Webhook (higher rate limit) ──────────────────────────────────────────
    location /api/webhooks/ {
      limit_req zone=webhook_limit burst=50 nodelay;
      proxy_pass http://api_upstream/webhooks/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id      $request_id;
      proxy_buffering off;
    }

    # ── Auth endpoints (strict rate limit) ──────────────────────────────────
    location ~ ^/api/(auth|users/register) {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_pass http://api_upstream;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id      $request_id;
    }

    # ── WebSocket (Socket.IO) ────────────────────────────────────────────────
    location /api/socket.io/ {
      proxy_pass         http://api_upstream/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── API (general) ────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://api_upstream/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id      $request_id;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ── Operator dashboard ───────────────────────────────────────────────────
    location /operator/ {
      proxy_pass http://operator_upstream/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Merchant/customer dashboard (SPA catch-all) ──────────────────────────
    location / {
      proxy_pass http://dashboard_upstream/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_intercept_errors on;
      error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
      proxy_pass http://dashboard_upstream/index.html;
    }
  }
}
